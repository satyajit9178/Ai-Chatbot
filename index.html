<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant</title>

  <link rel="icon" href="image/robotFavicon.png">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>🤖 AI Assistant</h2>
      </div>

      <button class="new-chat">＋ New Chat</button>

      <div class="history">
        <p class="history-title">Recent</p>
        <div class="history-item">Demo conversation</div>
        <div class="history-item">Project ideas</div>
      </div>

      <div class="sidebar-footer">
        <p>Free Demo</p>
      </div>
    </aside>


    <!-- MAIN CHAT AREA -->
    <main class="chat-container">

      <header class="chat-header">
        <h2>AI Chat Assistant</h2>
      </header>

      <!-- CHAT BODY -->
      <div class="chat-body">

        <div class="message bot-message">
          <svg class="bot-avatar"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 1024 1024">
            <path d="M738.3 287.6H285.7c-59 0-106.8 47.8-106.8 106.8v303.1c0 59 47.8 106.8 106.8 106.8h81.5v111.1c0 .7.8 1.1 1.4.7l166.9-110.6h117.4c59 0 106.8-47.8 106.8-106.8V394.5c0-59-47.8-106.9-106.8-106.9z"/>
          </svg>

          <div class="message-text">
            Welcome to your AI Assistant 🧠<br>
            How can I help you today?
          </div>
        </div>

      </div>

      <!-- INPUT AREA -->
      <div class="chat-footer">
        <form class="chat-form">

          <textarea
            placeholder="Message AI Assistant..."
            class="message-input"
            required></textarea>

          <div class="chat-controls">

            <div class="file-upload-wrapper">
              <input type="file" accept="image/*"
                     id="file-input" hidden>
              <img src="#">
              <button type="button" id="file-upload"
                class="material-symbols-rounded">
                attach_file
              </button>
              <button type="button" id="file-cancel"
                class="material-symbols-rounded">
                close
              </button>
            </div>

            <button type="submit"
              id="send-message"
              class="material-symbols-rounded">
              arrow_upward
            </button>

          </div>
        </form>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
